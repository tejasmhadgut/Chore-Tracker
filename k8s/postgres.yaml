apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: choretrack
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: choretrack-postgres
  namespace: choretrack
spec:
  serviceName: choretrack-postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: postgres
            - name: POSTGRES_PASSWORD
              value: postgres
            - name: POSTGRES_DB
              value: choretrack_db
          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres"]
            initialDelaySeconds: 10
            periodSeconds: 5
      volumes:
        - name: postgres-storage
          persistentVolumeClaim:
            claimName: postgres-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: choretrack-postgres
  namespace: choretrack
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
  clusterIP: None
---
# Read replica
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-replica-pvc
  namespace: choretrack
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: choretrack-postgres-replica
  namespace: choretrack
spec:
  serviceName: choretrack-postgres-replica
  replicas: 1
  selector:
    matchLabels:
      app: postgres-replica
  template:
    metadata:
      labels:
        app: postgres-replica
    spec:
      initContainers:
        - name: replica-init
          image: postgres:16-alpine
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: choretrack-db-secret
                  key: replicator-password
          command:
            - sh
            - -c
            - |
              if [ ! -s /var/lib/postgresql/data/PG_VERSION ]; then
                until pg_basebackup -h choretrack-postgres -U replicator -D /var/lib/postgresql/data -Fp -Xs -R -P 2>/dev/null; do
                  echo "Waiting for primary..." && sleep 5
                done
                chown -R 999:999 /var/lib/postgresql/data
                chmod 700 /var/lib/postgresql/data
              fi
          volumeMounts:
            - name: replica-storage
              mountPath: /var/lib/postgresql/data
      containers:
        - name: postgres-replica
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: postgres
            - name: POSTGRES_PASSWORD
              value: postgres
          volumeMounts:
            - name: replica-storage
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres"]
            initialDelaySeconds: 15
            periodSeconds: 5
      volumes:
        - name: replica-storage
          persistentVolumeClaim:
            claimName: postgres-replica-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: choretrack-postgres-replica
  namespace: choretrack
spec:
  selector:
    app: postgres-replica
  ports:
    - port: 5432
      targetPort: 5432
  clusterIP: None

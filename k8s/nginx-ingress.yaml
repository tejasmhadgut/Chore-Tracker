apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: choretrack
data:
  nginx.conf: |
    user nginx;
    worker_processes auto;
    error_log /var/log/nginx/error.log warn;
    pid /var/run/nginx.pid;

    events {
        worker_connections 10000;
        use epoll;
    }

    http {
        include /etc/nginx/mime.types;
        default_type application/octet-stream;

        log_format main '$remote_addr - [$time_local] "$request" $status '
                        'rt=$request_time upstream=$upstream_addr';
        access_log /dev/stdout main;

        sendfile on;
        keepalive_timeout 65;
        gzip on;
        gzip_types application/json text/plain;

        upstream choretrack_api {
            least_conn;
            server choretrack-api:5000;
            keepalive 32;
        }

        server {
            listen 80;

            location /health {
                access_log off;
                proxy_pass http://choretrack_api;
                proxy_http_version 1.1;
                proxy_set_header Connection "";
            }

            location /choreHub {
                proxy_pass http://choretrack_api;
                proxy_http_version 1.1;
                proxy_set_header Upgrade $http_upgrade;
                proxy_set_header Connection "upgrade";
                proxy_set_header Host $host;
                proxy_read_timeout 86400;
            }

            location /api {
                proxy_pass http://choretrack_api;
                proxy_http_version 1.1;
                proxy_set_header Connection "";
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_cookie_path / "/";
                proxy_connect_timeout 30s;
                proxy_read_timeout 30s;
            }

            location / {
                proxy_pass http://choretrack_api;
                proxy_http_version 1.1;
                proxy_set_header Connection "";
                proxy_set_header Host $host;
            }
        }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: choretrack-nginx
  namespace: choretrack
spec:
  replicas: 1
  selector:
    matchLabels:
      app: choretrack-nginx
  template:
    metadata:
      labels:
        app: choretrack-nginx
    spec:
      containers:
        - name: nginx
          image: nginx:alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
      volumes:
        - name: nginx-config
          configMap:
            name: nginx-config
---
apiVersion: v1
kind: Service
metadata:
  name: choretrack-nginx
  namespace: choretrack
spec:
  selector:
    app: choretrack-nginx
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30080
  type: NodePort

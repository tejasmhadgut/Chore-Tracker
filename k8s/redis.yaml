apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: choretrack-redis
  namespace: choretrack
spec:
  serviceName: choretrack-redis
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: choretrack-redis
  namespace: choretrack
spec:
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379

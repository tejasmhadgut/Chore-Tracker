# Nginx Load Balancer Configuration for ChoreTrack Distributed System
# This configuration balances traffic across multiple API instances
# and maintains sticky sessions for WebSocket connections (SignalR)

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 10000;
    use epoll;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Enhanced logging format with request time and upstream info
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time" '
                    'upstream: $upstream_addr';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 20M;

    # Gzip compression for API responses
    gzip on;
    gzip_vary on;
    gzip_min_length 1000;
    gzip_types text/plain text/css text/xml text/javascript 
               application/x-javascript application/xml+rss 
               application/json application/javascript;

    # Upstream backend servers (least-connections load balancing)
    upstream choretrack_api {
        least_conn;

        server api-1:5000 max_fails=3 fail_timeout=30s;
        server api-2:5000 max_fails=3 fail_timeout=30s;

        keepalive 32;
    }

    # Cache configuration for static assets
    proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=api_cache:10m max_size=1g inactive=60m use_temp_path=off;

    server {
        listen 80;
        server_name localhost;
        
        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # Health check endpoint
        location /health {
            access_log off;
            proxy_pass http://choretrack_api;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # Hangfire Dashboard (job management)
        location /hangfire {
            proxy_pass http://choretrack_api;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # SignalR WebSocket endpoint (real-time notifications)
        # CRITICAL: Must use sticky sessions so WebSocket connections stay on same server
        location /choreHub {
            proxy_pass http://choretrack_api;
            
            # WebSocket support
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            
            # Header forwarding
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Timeouts for long-running WebSocket connections
            proxy_read_timeout 86400;
            proxy_send_timeout 86400;
            
            # Sticky sessions: route subsequent requests from same client to same server
            # Based on IP address (or use cookie-based if IP isn't reliable)
            proxy_bind $remote_addr transparent;
        }

        # API endpoints (general proxy with caching)
        location /api {
            proxy_pass http://choretrack_api;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            
            # Header forwarding (important for auth, CORS, etc.)
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Cookie forwarding (for JWT auth)
            proxy_cookie_path / "/";
            
            # Timeouts
            proxy_connect_timeout 30s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
            
            # Caching for GET requests only
            proxy_cache api_cache;
            proxy_cache_methods GET HEAD;
            proxy_cache_valid 200 5m;
            proxy_cache_valid 404 1m;
            proxy_cache_use_stale error timeout http_500 http_502 http_503 http_504;
            
            # Add cache status header (for debugging)
            add_header X-Cache-Status $upstream_cache_status always;
            
            # Don't cache authenticated requests
            proxy_cache_bypass $http_authorization;
            proxy_no_cache $http_authorization;
        }

        # Catch-all: proxy everything else to the API
        location / {
            proxy_pass http://choretrack_api;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Error pages
        error_page 502 503 504 @error;
        location @error {
            default_type application/json;
            return 503 '{"error":"Service temporarily unavailable. Please try again later."}';
        }
    }
}

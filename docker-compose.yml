version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: choretrack-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: choretrack_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - choretrack-network

  postgres-replica:
    image: postgres:16-alpine
    container_name: choretrack-postgres-replica
    environment:
      PGPASSWORD: replicator_pass
    volumes:
      - postgres_replica_data:/var/lib/postgresql/data
      - ./postgres-replica-entrypoint.sh:/entrypoint.sh:ro
    entrypoint: ["/entrypoint.sh"]
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 15
    networks:
      - choretrack-network

  redis:
    image: redis:7-alpine
    container_name: choretrack-redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - choretrack-network

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: choretrack-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"   # Management UI
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - choretrack-network

  api-1:
    build:
      context: ./ChoreTrackerAPI
      dockerfile: Dockerfile
    container_name: choretrack-api-1
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:5000
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=choretrack_db;Username=postgres;Password=postgres;Pooling=true;Minimum Pool Size=5;Maximum Pool Size=100"
      ConnectionStrings__ReadonlyConnection: "Host=postgres-replica;Port=5432;Database=choretrack_db;Username=postgres;Password=postgres;Pooling=true;Minimum Pool Size=5;Maximum Pool Size=100"
      ConnectionStrings__Redis: "redis:6379,abortConnect=false"
      ConnectionStrings__RabbitMQ: "rabbitmq"
      RUN_BACKGROUND_JOBS: "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - choretrack-network

  api-2:
    build:
      context: ./ChoreTrackerAPI
      dockerfile: Dockerfile
    container_name: choretrack-api-2
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:5000
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=choretrack_db;Username=postgres;Password=postgres;Pooling=true;Minimum Pool Size=5;Maximum Pool Size=100"
      ConnectionStrings__ReadonlyConnection: "Host=postgres-replica;Port=5432;Database=choretrack_db;Username=postgres;Password=postgres;Pooling=true;Minimum Pool Size=5;Maximum Pool Size=100"
      ConnectionStrings__Redis: "redis:6379,abortConnect=false"
      ConnectionStrings__RabbitMQ: "rabbitmq"
      RUN_BACKGROUND_JOBS: "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - choretrack-network

  api-worker:
    build:
      context: ./ChoreTrackerAPI
      dockerfile: Dockerfile
    container_name: choretrack-api-worker
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:5000
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=choretrack_db;Username=postgres;Password=postgres;Pooling=true;Minimum Pool Size=5;Maximum Pool Size=100"
      ConnectionStrings__ReadonlyConnection: "Host=postgres-replica;Port=5432;Database=choretrack_db;Username=postgres;Password=postgres;Pooling=true;Minimum Pool Size=5;Maximum Pool Size=100"
      ConnectionStrings__Redis: "redis:6379,abortConnect=false"
      ConnectionStrings__RabbitMQ: "rabbitmq"
      RUN_BACKGROUND_JOBS: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - choretrack-network

  nginx:
    image: nginx:alpine
    container_name: choretrack-nginx
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api-1
      - api-2
    networks:
      - choretrack-network

  frontend:
    image: node:20-alpine
    container_name: choretrack-frontend
    working_dir: /app
    environment:
      VITE_API_URL: http://localhost:8080
    ports:
      - "3000:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev"
    depends_on:
      - nginx
    networks:
      - choretrack-network

volumes:
  postgres_data:
  postgres_replica_data:

networks:
  choretrack-network:
    driver: bridge
